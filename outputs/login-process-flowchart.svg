<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800">
  <title>User Login Process</title>
  <desc>Step-by-step flowchart of the user authentication flow</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="#F8FAFC"/>

  <!-- Start -->
  <rect x="320" y="30" width="160" height="44" rx="22" fill="#1E293B"/>
  <text x="400" y="57" font-family="system-ui,sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Start</text>

  <line x1="400" y1="74" x2="400" y2="104" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Enter credentials -->
  <rect x="300" y="104" width="200" height="44" rx="6" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="400" y="126" font-family="system-ui,sans-serif" font-size="13" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Enter Credentials</text>

  <line x1="400" y1="148" x2="400" y2="178" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision: Valid? -->
  <polygon points="400,178 490,218 400,258 310,218" fill="#FEF9C3" stroke="#EAB308" stroke-width="1.5"/>
  <text x="400" y="218" font-family="system-ui,sans-serif" font-size="13" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Valid?</text>

  <!-- Yes branch -->
  <line x1="490" y1="218" x2="580" y2="218" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="527" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Yes</text>

  <!-- No branch -->
  <line x1="310" y1="218" x2="200" y2="218" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="200" y1="218" x2="200" y2="126" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="200" y1="126" x2="300" y2="126" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="255" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">No</text>

  <!-- Grant access -->
  <rect x="480" y="196" width="200" height="44" rx="6" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="580" y="218" font-family="system-ui,sans-serif" font-size="13" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Grant Access</text>

  <line x1="580" y1="240" x2="580" y2="310" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="580" y1="310" x2="400" y2="310" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Redirect to dashboard -->
  <rect x="300" y="310" width="200" height="44" rx="6" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="400" y="332" font-family="system-ui,sans-serif" font-size="13" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Redirect to Dashboard</text>

  <line x1="400" y1="354" x2="400" y2="384" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Log event -->
  <rect x="300" y="384" width="200" height="44" rx="6" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="400" y="406" font-family="system-ui,sans-serif" font-size="13" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Log Login Event</text>

  <line x1="400" y1="428" x2="400" y2="458" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- End -->
  <rect x="320" y="458" width="160" height="44" rx="22" fill="#1E293B"/>
  <text x="400" y="480" font-family="system-ui,sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">End</text>
</svg>
