<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <title>Brew</title>
  <desc>Geometric coffee cup logo mark in steel palette</desc>

  <!-- Cup body -->
  <rect x="12" y="20" width="22" height="18" rx="3" fill="#0F172A"/>

  <!-- Steam wisps -->
  <path d="M18,16 Q16,12 18,8" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M25,14 Q23,10 25,6" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M32,16 Q30,12 32,8" fill="none" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cup highlight -->
  <rect x="14" y="22" width="6" height="14" rx="2" fill="#38BDF8" opacity="0.25"/>

  <!-- Handle -->
  <path d="M34,23 Q42,23 42,29 Q42,35 34,35" fill="none" stroke="#0F172A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Saucer -->
  <ellipse cx="23" cy="39" rx="14" ry="3" fill="#0F172A"/>
  <ellipse cx="23" cy="38.5" rx="12" ry="2" fill="#38BDF8" opacity="0.2"/>
</svg>
