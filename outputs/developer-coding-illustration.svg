<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <title>Developer Coding</title>
  <desc>Flat illustration of a developer working at a desk with a monitor</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>

  <style>
    .float { animation: float 3s ease-in-out infinite; transform-origin: center; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  </style>

  <!-- Layer 1: Background -->
  <g id="background">
    <rect width="400" height="300" fill="url(#bgGrad)"/>
    <!-- Floor -->
    <rect x="0" y="220" width="400" height="80" fill="#DBEAFE"/>
    <!-- Wall shelf -->
    <rect x="260" y="80" width="120" height="8" rx="2" fill="#1D4ED8" opacity="0.3"/>
    <!-- Book on shelf -->
    <rect x="270" y="56" width="14" height="24" rx="1" fill="#1D4ED8"/>
    <rect x="286" y="60" width="12" height="20" rx="1" fill="#7C3AED"/>
    <rect x="300" y="58" width="10" height="22" rx="1" fill="#F97316"/>
  </g>

  <!-- Layer 2: Mid-ground -->
  <g id="midground">
    <!-- Desk -->
    <rect x="60" y="190" width="280" height="14" rx="3" fill="#1D4ED8"/>
    <rect x="80" y="204" width="10" height="30" rx="2" fill="#1D4ED8" opacity="0.7"/>
    <rect x="310" y="204" width="10" height="30" rx="2" fill="#1D4ED8" opacity="0.7"/>

    <!-- Monitor stand -->
    <rect x="188" y="168" width="24" height="22" rx="2" fill="#7C3AED" opacity="0.6"/>
    <rect x="172" y="188" width="56" height="6" rx="2" fill="#7C3AED" opacity="0.5"/>

    <!-- Monitor -->
    <rect x="120" y="100" width="160" height="100" rx="6" fill="#0F172A"/>
    <rect x="126" y="106" width="148" height="88" rx="4" fill="#1E3A5F"/>

    <!-- Code on monitor -->
    <rect x="132" y="114" width="60" height="5" rx="2" fill="#38BDF8" opacity="0.8"/>
    <rect x="138" y="124" width="80" height="5" rx="2" fill="#7C3AED" opacity="0.7"/>
    <rect x="138" y="134" width="50" height="5" rx="2" fill="#F97316" opacity="0.7"/>
    <rect x="132" y="144" width="90" height="5" rx="2" fill="#38BDF8" opacity="0.6"/>
    <rect x="138" y="154" width="40" height="5" rx="2" fill="#7C3AED" opacity="0.5"/>
    <rect x="138" y="164" width="70" height="5" rx="2" fill="#38BDF8" opacity="0.5"/>

    <!-- Cursor blink indicator -->
    <rect x="212" y="164" width="3" height="8" rx="1" fill="#FFFFFF" opacity="0.9"/>

    <!-- Keyboard -->
    <rect x="130" y="193" width="120" height="18" rx="3" fill="#0F172A" opacity="0.5"/>

    <!-- Coffee mug -->
    <rect x="310" y="168" width="22" height="22" rx="3" fill="#1D4ED8"/>
    <path d="M332,175 Q340,175 340,179 Q340,183 332,183" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
    <rect x="313" y="171" width="16" height="5" rx="1" fill="#38BDF8" opacity="0.5"/>
  </g>

  <!-- Layer 3: Foreground — Developer character -->
  <g id="foreground" class="float">
    <!-- Chair -->
    <rect x="170" y="210" width="60" height="10" rx="3" fill="#7C3AED" opacity="0.7"/>
    <rect x="190" y="220" width="20" height="20" rx="2" fill="#7C3AED" opacity="0.5"/>

    <!-- Body -->
    <rect x="178" y="155" width="44" height="55" rx="8" fill="#F97316"/>

    <!-- Head -->
    <circle cx="200" cy="140" r="22" fill="#FDDCB5"/>

    <!-- Hair -->
    <path d="M178,130 Q180,112 200,110 Q220,112 222,130" fill="#1E293B"/>

    <!-- Eyes -->
    <circle cx="193" cy="138" r="3" fill="#1E293B"/>
    <circle cx="207" cy="138" r="3" fill="#1E293B"/>

    <!-- Arms reaching for keyboard -->
    <rect x="148" y="170" width="30" height="12" rx="6" fill="#F97316" transform="rotate(-20, 163, 176)"/>
    <rect x="222" y="170" width="30" height="12" rx="6" fill="#F97316" transform="rotate(20, 237, 176)"/>
  </g>
</svg>
